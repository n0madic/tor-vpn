<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- macOS template icon: black shapes on transparent background.
       iconAsTemplate=true inverts for dark menu bar automatically. -->

  <!-- Shield outline -->
  <path d="M11 1
    C11 1 20 3 20 3
    C20 3 20 10 20 10
    C20 15.5 15.5 19 11 21
    C6.5 19 2 15.5 2 10
    C2 10 2 3 2 3
    C2 3 11 1 11 1Z"
    fill="black" opacity="0.85"/>

  <!-- Onion layers (white/transparent to cut through) -->
  <!-- Layer 3 -->
  <ellipse cx="11" cy="11.5" rx="5.5" ry="6.5" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- Layer 2 -->
  <ellipse cx="11" cy="11.5" rx="3.8" ry="4.8" fill="none" stroke="white" stroke-width="1" opacity="0.7"/>

  <!-- Layer 1 -->
  <ellipse cx="11" cy="11.5" rx="2.2" ry="3" fill="none" stroke="white" stroke-width="1" opacity="0.85"/>

  <!-- Core -->
  <ellipse cx="11" cy="11.5" rx="1" ry="1.3" fill="white" opacity="0.9"/>

  <!-- Sprout -->
  <path d="M11 5 C10.5 4 10.5 3.2 11 2.5 C11.5 3.2 11.5 4 11 5Z" fill="white" opacity="0.8"/>
</svg>
